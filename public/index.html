<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhadauriya AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #22c55e;
            --primary-dark: #16a34a;
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ececec;
            --text-secondary: #b4b4b4;
            --border-color: #404040;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-history-item {
            padding: 10px 12px;
            margin-bottom: 4px;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-history-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .chat-history-item.active {
            background: var(--bg-tertiary);
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }

        /* TOP BAR */
        .topbar {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
        }

        .topbar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .topbar-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* CHAT AREA */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .messages-wrapper {
            width: 100%;
            max-width: 768px;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
            color: var(--text-secondary);
        }

        /* MESSAGES */
        .message-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-user {
            display: flex;
            justify-content: flex-end;
        }

        .message-bubble-user {
            max-width: 80%;
            background: var(--primary);
            color: #000;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-bot {
            display: flex;
            gap: 8px;
        }

        .bot-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #000;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .message-bubble-bot {
            max-width: 80%;
            padding: 0;
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message-bubble-bot p {
            margin-bottom: 12px;
        }

        .message-bubble-bot p:last-child {
            margin-bottom: 0;
        }

        /* FILE PREVIEWS IN MESSAGES */
        .file-preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .image-thumbnail {
            max-width: 150px;
            max-height: 150px;
            border-radius: 8px;
            cursor: pointer;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        .doc-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-tertiary);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            border: 1px solid var(--border-color);
        }

        .doc-icon {
            font-size: 14px;
        }

        /* INPUT AREA */
        .input-area {
            width: 100%;
            max-width: 768px;
            padding: 20px;
            padding-bottom: 40px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .attachment-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-bottom: 8px;
        }

        .preview-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 12px;
        }

        .preview-remove {
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: bold;
            margin-left: 4px;
        }

        .preview-remove:hover {
            color: var(--text-primary);
        }

        .input-controls {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .input-box {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            max-height: 150px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-box:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-secondary);
        }

        .input-box::placeholder {
            color: var(--text-secondary);
        }

        .input-button {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .input-button:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .input-button.send {
            background: var(--primary);
            color: #000;
        }

        .input-button.send:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        .input-button.send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-button.listening {
            color: #ff4444;
            animation: pulse 1s infinite;
        }

        .input-button.voice-chat {
            color: var(--primary);
        }

        /* VOICE CHAT MODAL */
        .voice-chat-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
        }

        .voice-chat-modal.active {
            display: flex;
        }

        .voice-chat-header {
            text-align: center;
            margin-top: 24px;
        }

        .voice-chat-status {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            height: 20px;
        }

        .voice-chat-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ANIMATED WAVEFORM */
        .waveform-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 60px;
            margin: 24px 0;
        }

        .waveform-bar {
            width: 4px;
            height: 40px;
            background: var(--primary);
            border-radius: 2px;
            animation: waveform 0.8s ease-in-out infinite;
        }

        .waveform-bar:nth-child(1) { animation-delay: -0.4s; }
        .waveform-bar:nth-child(2) { animation-delay: -0.3s; }
        .waveform-bar:nth-child(3) { animation-delay: -0.2s; }
        .waveform-bar:nth-child(4) { animation-delay: -0.1s; }
        .waveform-bar:nth-child(5) { animation-delay: 0s; }

        .waveform-container.thinking .waveform-bar {
            background: var(--text-secondary);
        }

        .waveform-container.speaking .waveform-bar {
            background: #ff9800;
        }

        @keyframes waveform {
            0%, 100% { height: 20px; }
            50% { height: 50px; }
        }

        /* TRANSCRIPT AREAS */
        .voice-chat-content {
            width: 100%;
            max-width: 600px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 0 24px;
            overflow-y: auto;
        }

        .transcript-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
        }

        .transcript-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .transcript-text {
            font-size: 15px;
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 20px;
        }

        .transcript-text.empty {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* VOICE CHAT CONTROLS */
        .voice-chat-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .voice-chat-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: #000;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: bold;
        }

        .voice-chat-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .voice-chat-btn.end-call {
            background: #ff4444;
            color: white;
        }

        .voice-chat-btn.end-call:hover {
            background: #cc0000;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* MODALS */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
        }

        /* LOADING */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-secondary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }

            .messages-wrapper {
                max-width: 100%;
            }

            .input-area {
                max-width: 100%;
            }

            .message-bubble-user,
            .message-bubble-bot {
                max-width: 90%;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                display: none;
            }

            .messages-wrapper {
                padding: 12px;
            }

            .input-area {
                padding: 12px;
                padding-bottom: 20px;
            }
        }

        /* ASCII labels for compact action buttons */
        .input-button {
            width: auto;
            min-width: 42px;
            padding: 0 8px;
            font-size: 12px;
        }

        .input-button.send {
            min-width: 48px;
        }

        /* Mobile history drawer and delete controls */
        .chat-history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .chat-history-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-chat-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            flex-shrink: 0;
        }

        .delete-chat-btn:hover {
            background: rgba(239, 68, 68, 0.16);
            color: #f87171;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .menu-toggle {
            display: none;
            min-width: 48px;
            height: 36px;
            padding: 0 8px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 12px;
        }

        .sidebar-overlay {
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: flex !important;
                width: min(84vw, 300px) !important;
                position: fixed;
                inset: 0 auto 0 0;
                z-index: 1500;
                transform: translateX(-105%);
                transition: transform 0.2s ease;
                box-shadow: 20px 0 60px rgba(0, 0, 0, 0.45);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.55);
                z-index: 1400;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s ease;
            }

            .sidebar-overlay.active {
                opacity: 1;
                pointer-events: auto;
            }

            .menu-toggle {
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .topbar {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn">
                <span>+</span>
                <span>New Chat</span>
            </button>
        </div>
        <div class="chat-history"></div>
        <div class="sidebar-footer">
            <span id="model-name">Bhadauriya AI</span>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <!-- TOP BAR -->
        <div class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menu-toggle" type="button" aria-label="Open previous chats">Menu</button>
                <div class="topbar-title">Bhadauriya AI</div>
            </div>
            <div class="topbar-status">
                <span class="status-dot"></span>
                <span>Ready</span>
            </div>
        </div>

        <!-- CHAT CONTAINER -->
        <div class="chat-container">
            <div class="messages-wrapper"></div>
        </div>

        <!-- INPUT AREA -->
        <div class="input-area">
            <div class="input-wrapper">
                <div class="attachment-preview"></div>
                <div class="input-controls">
                    <button class="input-button" title="Attach Image">Image</button>
                    <button class="input-button" title="Attach Document">File</button>
                    <textarea class="input-box" placeholder="Message Bhadauriya AI..." rows="1"></textarea>
                    <button class="input-button" title="Voice Input">Mic</button>
                    <button class="input-button voice-chat" title="Voice Chat" aria-label="Start voice chat with AI">Call</button>
                    <button class="input-button send" title="Send">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- IMAGE VIEWER MODAL -->
    <div class="modal" id="image-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">Image</span>
                <button class="modal-close"></button>
            </div>
            <div id="image-modal-body"></div>
        </div>
    </div>

    <!-- VOICE CHAT MODAL -->
    <div class="voice-chat-modal" id="voice-chat-modal">
        <div class="voice-chat-header">
            <div class="voice-chat-status" id="voice-chat-status">Connecting...</div>
            <div class="voice-chat-title">Voice Chat</div>
        </div>

        <div class="waveform-container" id="waveform-container">
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
        </div>

        <div class="voice-chat-content">
            <div class="transcript-section">
                <div class="transcript-label">You said:</div>
                <div class="transcript-text empty" id="user-transcript">Listening...</div>
            </div>

            <div class="transcript-section">
                <div class="transcript-label">Bhadauriya AI:</div>
                <div class="transcript-text empty" id="ai-transcript">Waiting for your voice...</div>
            </div>
        </div>

        <div class="voice-chat-controls">
            <button class="voice-chat-btn end-call" id="end-call-btn" title="End Call"></button>
        </div>
    </div>

    <script>
        // Constants and State
        const API_BASE = '/api';
        const PREVIEW_MAX_LENGTH = 50;
        const CHAT_STORAGE_KEY = 'bhadauriya-ai-chats';
        const MAX_DOCUMENT_SIZE = 1024 * 1024; // 1MB
        const VOICE_CHAT_ERROR_RECOVERY_DELAY = 1500; // Milliseconds before resuming listening after error
        const SPEECH_SYNTHESIS_RATE = 1;
        const SPEECH_SYNTHESIS_PITCH = 1;
        const SPEECH_SYNTHESIS_VOLUME = 1;

        // Error message mapping for voice chat
        const VOICE_CHAT_ERROR_MESSAGES = {
            'not-allowed': 'Microphone access denied. Please grant microphone permissions.',
            'network': 'Network error. Please check your connection.',
            'no-speech': 'No speech detected. Please try speaking again.',
            'audio-capture': 'No microphone found. Please check your device.',
            'permission-denied': 'Microphone permission denied. Please allow access in browser settings.',
            'default': 'An error occurred. Please try again.'
        };

        let sessionId = null;
        let currentChatId = null;
        let isListening = false;
        let selectedImages = [];
        let selectedDocuments = [];

        // Voice Chat State
        let voiceChatActive = false;
        let voiceChatRecognition = null;
        let voiceChatSynthesis = window.speechSynthesis;
        let isSpeaking = false;
        let awaitingUserInput = false;

        // DOM Elements
        const messagesWrapper = document.querySelector('.messages-wrapper');
        const inputBox = document.querySelector('.input-box');
        const attachImageBtn = document.querySelectorAll('.input-button')[0];
        const attachDocBtn = document.querySelectorAll('.input-button')[1];
        const voiceBtn = document.querySelectorAll('.input-button')[2];
        const voiceChatBtn = document.querySelectorAll('.input-button')[3];
        const sendBtn = document.querySelectorAll('.input-button')[4];
        const newChatBtn = document.querySelector('.new-chat-btn');
        const chatHistory = document.querySelector('.chat-history');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const menuToggle = document.getElementById('menu-toggle');
        const attachmentPreview = document.querySelector('.attachment-preview');
        const imageModal = document.getElementById('image-modal');
        const imageModalClose = imageModal.querySelector('.modal-close');

        // Voice Chat Modal Elements
        const voiceChatModal = document.getElementById('voice-chat-modal');
        const voiceChatStatus = document.getElementById('voice-chat-status');
        const waveformContainer = document.getElementById('waveform-container');
        const userTranscript = document.getElementById('user-transcript');
        const aiTranscript = document.getElementById('ai-transcript');
        const endCallBtn = document.getElementById('end-call-btn');

        // Initialize
        async function init() {
            const response = await fetch(`${API_BASE}/session`, { method: 'POST' });
            const data = await response.json();
            sessionId = data.sessionId;
            createHiddenFileInputs();
            setupEventListeners();

            const chats = readStoredChats();
            if (chats.length > 0) {
                switchChat(chats[0].id);
            } else {
                await newChat();
            }
            loadChatHistory();

            // Preload voices for speech synthesis
            if (voiceChatSynthesis) {
                voiceChatSynthesis.onvoiceschanged = () => {
                    // Voices loaded, ensures they are available for speech synthesis
                };
            }
        }

        function setupEventListeners() {
            // Input
            inputBox.addEventListener('input', () => {
                inputBox.style.height = 'auto';
                inputBox.style.height = Math.min(inputBox.scrollHeight, 150) + 'px';
                updateSendButtonState();
            });

            inputBox.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Buttons
            sendBtn.addEventListener('click', sendMessage);
            attachImageBtn.addEventListener('click', () => document.getElementById('image-input').click());
            attachDocBtn.addEventListener('click', () => document.getElementById('doc-input').click());
            voiceBtn.addEventListener('click', startVoiceInput);
            voiceChatBtn.addEventListener('click', startVoiceChat);
            endCallBtn.addEventListener('click', endVoiceChat);
            newChatBtn.addEventListener('click', () => {
                newChat();
                closeSidebar();
            });
            menuToggle.addEventListener('click', openSidebar);
            sidebarOverlay.addEventListener('click', closeSidebar);

            // Modal
            imageModalClose.addEventListener('click', () => imageModal.classList.remove('active'));
            imageModal.addEventListener('click', (e) => {
                if (e.target === imageModal) imageModal.classList.remove('active');
            });
        }

        function createHiddenFileInputs() {
            const imageInput = document.createElement('input');
            imageInput.type = 'file';
            imageInput.id = 'image-input';
            imageInput.accept = 'image/*';
            imageInput.multiple = true;
            imageInput.style.display = 'none';
            imageInput.addEventListener('change', handleImageSelect);
            document.body.appendChild(imageInput);

            const docInput = document.createElement('input');
            docInput.type = 'file';
            docInput.id = 'doc-input';
            docInput.accept = '.txt,.md';
            docInput.multiple = true;
            docInput.style.display = 'none';
            docInput.addEventListener('change', handleDocumentSelect);
            document.body.appendChild(docInput);
        }

        function handleImageSelect(e) {
            const files = Array.from(e.target.files);
            Promise.all(files.map(file =>
                new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        selectedImages.push({
                            data: reader.result,
                            mimeType: file.type,
                            name: file.name
                        });
                        resolve();
                    };
                    reader.readAsDataURL(file);
                })
            )).then(() => {
                updateAttachmentPreview();
                e.target.value = '';
            });
        }

        function handleDocumentSelect(e) {
            const files = Array.from(e.target.files);
            Promise.all(files.map(file =>
                new Promise((resolve) => {
                    // Check file size
                    if (file.size > MAX_DOCUMENT_SIZE) {
                        displayMessage('bot', { text: ` File "${file.name}" is too large. Maximum size is 1MB.` });
                        resolve();
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = () => {
                        selectedDocuments.push({
                            content: reader.result,
                            name: file.name
                        });
                        resolve();
                    };
                    reader.onerror = () => {
                        displayMessage('bot', { text: ` Error reading file "${file.name}"` });
                        resolve();
                    };
                    reader.readAsText(file);
                })
            )).then(() => {
                updateAttachmentPreview();
                e.target.value = '';
            });
        }

        function updateAttachmentPreview() {
            attachmentPreview.innerHTML = '';

            selectedImages.forEach((img, idx) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = ` ${img.name} <span class="preview-remove"></span>`;
                const removeBtn = div.querySelector('.preview-remove');
                removeBtn.addEventListener('click', () => removeImage(idx));
                attachmentPreview.appendChild(div);
            });

            selectedDocuments.forEach((doc, idx) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = ` ${doc.name} <span class="preview-remove"></span>`;
                const removeBtn = div.querySelector('.preview-remove');
                removeBtn.addEventListener('click', () => removeDocument(idx));
                attachmentPreview.appendChild(div);
            });

            updateSendButtonState();
        }

        function removeImage(idx) {
            selectedImages.splice(idx, 1);
            updateAttachmentPreview();
        }

        function removeDocument(idx) {
            selectedDocuments.splice(idx, 1);
            updateAttachmentPreview();
        }

        function updateSendButtonState() {
            const hasContent = inputBox.value.trim() || selectedImages.length > 0 || selectedDocuments.length > 0;
            sendBtn.disabled = !hasContent;
        }

        async function sendMessage() {
            const message = inputBox.value.trim();
            if (!message && selectedImages.length === 0 && selectedDocuments.length === 0) return;

            // Save copies before clearing
            const images = [...selectedImages];
            const documents = [...selectedDocuments];

            const userContent = {
                message,
                images,
                documents
            };
            const apiHistory = getApiHistory(currentChatId);

            // Display user message
            displayMessage('user', userContent);
            appendStoredMessage(currentChatId, 'user', userContent);

            // Clear input
            inputBox.value = '';
            inputBox.style.height = 'auto';
            selectedImages = [];
            selectedDocuments = [];
            updateAttachmentPreview();

            // Send to API
            try {
                sendBtn.disabled = true;
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        sessionId: currentChatId,
                        images,
                        documents,
                        history: apiHistory
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    displayMessage('bot', { text: `Error: ${error.error}` });
                    return;
                }

                const data = await response.json();
                displayMessage('bot', { text: data.reply });
                appendStoredMessage(currentChatId, 'bot', { text: data.reply });
                saveChat(message, images, documents);
            } catch (error) {
                displayMessage('bot', { text: `Error: ${error.message}` });
            } finally {
                sendBtn.disabled = false;
                updateSendButtonState();
            }
        }

        function displayMessage(role, content) {
            const messageGroup = document.createElement('div');
            messageGroup.className = 'message-group';

            if (role === 'user') {
                const userMsg = document.createElement('div');
                userMsg.className = 'message-user';
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble-user';
                bubble.textContent = content.message || 'Sent attachments';
                bubble.setAttribute('aria-label', 'User message with attachments');
                userMsg.appendChild(bubble);
                messageGroup.appendChild(userMsg);

                // Add images preview
                if (content.images && content.images.length > 0) {
                    const filePreview = document.createElement('div');
                    filePreview.className = 'file-preview-container';
                    filePreview.style.justifyContent = 'flex-end';
                    content.images.forEach(img => {
                        const thumb = document.createElement('img');
                        thumb.className = 'image-thumbnail';
                        thumb.src = img.data;
                        thumb.addEventListener('click', () => showImageModal(img.data));
                        filePreview.appendChild(thumb);
                    });
                    messageGroup.appendChild(filePreview);
                }

                // Add documents preview
                if (content.documents && content.documents.length > 0) {
                    const filePreview = document.createElement('div');
                    filePreview.className = 'file-preview-container';
                    filePreview.style.justifyContent = 'flex-end';
                    content.documents.forEach(doc => {
                        const chip = document.createElement('div');
                        chip.className = 'doc-chip';
                        chip.innerHTML = `<span class="doc-icon"></span><span>${doc.name}</span>`;
                        filePreview.appendChild(chip);
                    });
                    messageGroup.appendChild(filePreview);
                }
            } else {
                const botMsg = document.createElement('div');
                botMsg.className = 'message-bot';
                const avatar = document.createElement('div');
                avatar.className = 'bot-avatar';
                avatar.textContent = 'B';
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble-bot';
                bubble.innerHTML = formatBotMessage(content.text);
                botMsg.appendChild(avatar);
                botMsg.appendChild(bubble);
                messageGroup.appendChild(botMsg);
            }

            messagesWrapper.appendChild(messageGroup);
            messagesWrapper.scrollTop = messagesWrapper.scrollHeight;
        }

        function formatBotMessage(text) {
            // Basic markdown support
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function showImageModal(src) {
            const modalBody = document.getElementById('image-modal-body');
            modalBody.innerHTML = ''; // Clear first
            const img = document.createElement('img');
            img.src = src;
            img.style.width = '100%';
            img.style.borderRadius = '8px';
            modalBody.appendChild(img);
            imageModal.classList.add('active');
        }

        function startVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                displayMessage('bot', { text: ' Speech Recognition is not supported in this browser. Please try using Chrome or Edge.' });
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            isListening = true;
            voiceBtn.classList.add('listening');
            voiceBtn.textContent = '';

            recognition.onstart = () => {
                voiceBtn.textContent = '';
            };

            recognition.onend = () => {
                isListening = false;
                voiceBtn.classList.remove('listening');
                voiceBtn.textContent = '';
            };

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                inputBox.value = transcript;
                inputBox.style.height = 'auto';
                inputBox.style.height = Math.min(inputBox.scrollHeight, 150) + 'px';
                updateSendButtonState();
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                displayMessage('bot', { text: ` Speech recognition error: ${event.error}` });
            };

            recognition.start();
        }

        //  VOICE CHAT FUNCTIONS

        function startVoiceChat() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                displayMessage('bot', { text: ' Voice Chat is not supported in this browser. Please use Chrome or Edge.' });
                return;
            }

            if (!voiceChatSynthesis) {
                displayMessage('bot', { text: ' Text-to-Speech is not supported in this browser.' });
                return;
            }

            voiceChatActive = true;
            voiceChatModal.classList.add('active');
            updateVoiceChatStatus('Listening...');
            updateWaveformState('listening');

            // Reset transcripts
            userTranscript.textContent = 'Listening...';
            userTranscript.classList.add('empty');
            aiTranscript.textContent = 'Waiting for your voice...';
            aiTranscript.classList.add('empty');

            startVoiceChatListening();
        }

        function startVoiceChatListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            voiceChatRecognition = new SpeechRecognition();
            voiceChatRecognition.continuous = true;
            voiceChatRecognition.interimResults = true;
            voiceChatRecognition.lang = 'en-US';

            // finalTranscript persists within this recognition session to accumulate text from multiple
            // onresult events. It's reset each time startVoiceChatListening() is called (new session).
            let finalTranscript = '';

            voiceChatRecognition.onstart = () => {
                updateVoiceChatStatus('Listening...');
                updateWaveformState('listening');
                awaitingUserInput = true;
            };

            voiceChatRecognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                // Display interim or final transcript
                const displayText = (finalTranscript + interimTranscript).trim();
                if (displayText) {
                    userTranscript.textContent = displayText;
                    userTranscript.classList.remove('empty');
                }
            };

            voiceChatRecognition.onend = async () => {
                if (!voiceChatActive) return;

                const trimmedTranscript = finalTranscript.trim();
                if (trimmedTranscript) {
                    // Send the message
                    updateVoiceChatStatus('Thinking...');
                    updateWaveformState('thinking');
                    await sendVoiceChatMessage(trimmedTranscript);
                } else {
                    // No speech detected, resume listening
                    startVoiceChatListening();
                }
            };

            voiceChatRecognition.onerror = (event) => {
                console.error('Voice chat recognition error:', event.error);
                if (voiceChatActive) {
                    // Only show error and recover for non-'no-speech' errors
                    const isRecoverableError = event.error !== 'no-speech';

                    if (isRecoverableError) {
                        const userMessage = VOICE_CHAT_ERROR_MESSAGES[event.error] || VOICE_CHAT_ERROR_MESSAGES['default'];
                        updateVoiceChatStatus(`Error: ${userMessage}`);

                        // Automatically recover from error by resuming listening after a delay
                        setTimeout(() => {
                            if (voiceChatActive) {
                                startVoiceChatListening();
                            }
                        }, VOICE_CHAT_ERROR_RECOVERY_DELAY);
                    }
                }
            };

            voiceChatRecognition.start();
        }

        async function sendVoiceChatMessage(message) {
            if (!message.trim()) return;
            const apiHistory = getApiHistory(currentChatId);

            // Update UI
            userTranscript.textContent = message;
            updateVoiceChatStatus('Thinking...');
            updateWaveformState('thinking');

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message.trim(),
                        sessionId: currentChatId,
                        images: [],
                        documents: [],
                        history: apiHistory
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    displayMessage('bot', { text: `Error: ${error.error}` });
                    aiTranscript.textContent = 'Error occurred. Try again.';
                    aiTranscript.classList.remove('empty');

                    // Resume listening after error
                    if (voiceChatActive) {
                        setTimeout(() => startVoiceChatListening(), VOICE_CHAT_ERROR_RECOVERY_DELAY);
                    }
                    return;
                }

                const data = await response.json();
                const reply = data.reply;

                // Display in main chat
                const voiceUserContent = { message, images: [], documents: [] };
                displayMessage('user', voiceUserContent);
                appendStoredMessage(currentChatId, 'user', voiceUserContent);
                displayMessage('bot', { text: reply });
                appendStoredMessage(currentChatId, 'bot', { text: reply });

                // Update voice chat transcript
                aiTranscript.textContent = reply;
                aiTranscript.classList.remove('empty');

                // Speak the response
                if (voiceChatActive) {
                    await speakResponse(reply);

                    // Resume listening after speaking
                    if (voiceChatActive) {
                        startVoiceChatListening();
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                displayMessage('bot', { text: `Error: ${error.message}` });
                aiTranscript.textContent = 'Error occurred. Try again.';
                aiTranscript.classList.remove('empty');

                // Resume listening after error
                if (voiceChatActive) {
                    setTimeout(() => startVoiceChatListening(), VOICE_CHAT_ERROR_RECOVERY_DELAY);
                }
            }
        }

        function stripMarkdown(text) {
            // Remove markdown symbols - process bold (**) and strong (__) before italic (* and _)
            // to avoid conflicts where **bold** would leave * characters after removing **
            text = text.replace(/\*\*(.*?)\*\*/g, '$1'); // Remove bold (**)
            text = text.replace(/__(.*?)__/g, '$1'); // Remove bold (__)
            text = text.replace(/\*(.*?)\*/g, '$1'); // Remove italic (*)
            // For underscores, use word boundaries to handle _word_ at any position
            text = text.replace(/\b_(.*?)_\b/g, '$1'); // Remove italic (_) with word boundaries
            text = text.replace(/~~(.*?)~~/g, '$1'); // Remove strikethrough
            text = text.replace(/`(.*?)`/g, '$1'); // Remove inline code
            text = text.replace(/```[\s\S]*?```/g, ''); // Remove code blocks
            text = text.replace(/#+\s?(.*?)(?:\n|$)/g, '$1'); // Remove headings
            text = text.replace(/\[([^\]]+)\]\([^\)]+\)/g, '$1'); // Remove links
            text = text.replace(/>\s?(.*?)(?:\n|$)/g, '$1'); // Remove blockquotes
            return text.trim();
        }

        async function speakResponse(text) {
            return new Promise((resolve) => {
                // Cancel any ongoing speech
                voiceChatSynthesis.cancel();

                // Strip markdown from the text
                const cleanText = stripMarkdown(text);

                // Stop listening while speaking
                if (voiceChatRecognition) {
                    voiceChatRecognition.abort();
                    // Don't set to null immediately: the onend/onerror handlers may still be pending
                    // and could throw errors if the object is nullified before they execute
                }

                updateVoiceChatStatus('Speaking...');
                updateWaveformState('speaking');
                isSpeaking = true;

                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.rate = SPEECH_SYNTHESIS_RATE;
                utterance.pitch = SPEECH_SYNTHESIS_PITCH;
                utterance.volume = SPEECH_SYNTHESIS_VOLUME;
                utterance.lang = 'en-US';

                // Try to use a natural voice - attempt multiple fallback options
                const voices = voiceChatSynthesis.getVoices();
                if (voices.length > 0) {
                    // Select voice with preference order: Google > first English > first available
                    let selectedVoice = null;
                    let englishVoice = null;

                    for (const voice of voices) {
                        if (voice.name.includes('Google') && voice.lang.startsWith('en')) {
                            selectedVoice = voice;
                            break; // Highest priority, stop searching
                        }
                        if (!englishVoice && voice.lang.startsWith('en')) {
                            englishVoice = voice; // Remember first English voice for fallback
                        }
                    }

                    // Use best match or fallbacks in order
                    if (!selectedVoice && englishVoice) {
                        selectedVoice = englishVoice;
                    }
                    if (!selectedVoice && voices.length > 0) {
                        selectedVoice = voices[0]; // Last resort: use first available
                    }

                    if (selectedVoice) {
                        utterance.voice = selectedVoice;
                    }
                }

                utterance.onend = () => {
                    isSpeaking = false;
                    resolve();
                };

                utterance.onerror = (event) => {
                    console.error('Speech synthesis error:', event.error);
                    isSpeaking = false;
                    resolve();
                };

                voiceChatSynthesis.speak(utterance);
            });
        }

        function updateVoiceChatStatus(status) {
            voiceChatStatus.textContent = status;
        }

        function updateWaveformState(state) {
            waveformContainer.classList.remove('listening', 'thinking', 'speaking');
            if (state === 'listening') {
                waveformContainer.classList.add('listening');
            } else if (state === 'thinking') {
                waveformContainer.classList.add('thinking');
            } else if (state === 'speaking') {
                waveformContainer.classList.add('speaking');
            }
        }

        function endVoiceChat() {
            voiceChatActive = false;

            // Stop recognition
            if (voiceChatRecognition) {
                voiceChatRecognition.abort();
                voiceChatRecognition = null;
            }

            // Cancel speech
            voiceChatSynthesis.cancel();
            isSpeaking = false;

            // Hide modal
            voiceChatModal.classList.remove('active');

            // Reset state
            updateVoiceChatStatus('Connecting...');
            updateWaveformState('listening');
            userTranscript.textContent = 'Listening...';
            userTranscript.classList.add('empty');
            aiTranscript.textContent = 'Waiting for your voice...';
            aiTranscript.classList.add('empty');
        }

        function readStoredChats() {
            try {
                const chats = JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY) || '[]');
                return Array.isArray(chats) ? chats : [];
            } catch (error) {
                return [];
            }
        }

        function writeStoredChats(chats) {
            localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chats));
        }

        function getStoredChat(chatId) {
            return readStoredChats().find(chat => chat.id === chatId);
        }

        function createStoredChat(id = sessionId || `local-${Date.now()}`) {
            const now = new Date().toLocaleString();
            const chat = {
                id,
                timestamp: now,
                lastMessage: 'New chat',
                messages: []
            };
            writeStoredChats([chat, ...readStoredChats().filter(item => item.id !== id)]);
            return chat;
        }

        function getMessagePreview(message, images = [], documents = []) {
            if (message && message.trim()) {
                return message.substring(0, PREVIEW_MAX_LENGTH) + (message.length > PREVIEW_MAX_LENGTH ? '...' : '');
            }
            if (images && images.length > 0) return `Sent ${images.length} image(s)`;
            if (documents && documents.length > 0) return `Sent ${documents.length} document(s)`;
            return 'Chat started';
        }

        function getApiHistory(chatId) {
            const chat = getStoredChat(chatId);
            if (!chat || !Array.isArray(chat.messages)) return [];
            return chat.messages
                .filter(item => item.role === 'user' || item.role === 'bot')
                .map(item => ({
                    role: item.role === 'bot' ? 'model' : 'user',
                    text: item.role === 'bot' ? item.content.text : getMessagePreview(item.content.message, item.content.images, item.content.documents)
                }))
                .filter(item => item.text && item.text.trim())
                .slice(-40);
        }

        function appendStoredMessage(chatId, role, content) {
            let chats = readStoredChats();
            let chat = chats.find(item => item.id === chatId);
            if (!chat) {
                chat = createStoredChat(chatId);
                chats = readStoredChats();
            }
            chat.messages = Array.isArray(chat.messages) ? chat.messages : [];
            chat.messages.push({ role, content, createdAt: Date.now() });
            chat.timestamp = new Date().toLocaleString();
            chat.lastMessage = role === 'bot'
                ? (content.text || 'AI response').substring(0, PREVIEW_MAX_LENGTH)
                : getMessagePreview(content.message, content.images, content.documents);
            writeStoredChats([chat, ...chats.filter(item => item.id !== chat.id)]);
            loadChatHistory();
        }

        function renderEmptyState() {
            messagesWrapper.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon"></div>
                    <div class="empty-state-text">Start a new conversation</div>
                </div>
            `;
        }

        async function newChat() {
            try {
                const response = await fetch(`${API_BASE}/session`, { method: 'POST' });
                const data = await response.json();
                sessionId = data.sessionId || sessionId;
            } catch (error) {
                sessionId = `local-${Date.now()}`;
            }
            currentChatId = sessionId || `local-${Date.now()}`;
            createStoredChat(currentChatId);
            renderEmptyState();
            selectedImages = [];
            selectedDocuments = [];
            updateAttachmentPreview();
            updateSendButtonState();
            loadChatHistory();
        }
        function saveChat(message, images, documents) {
            const chats = readStoredChats();
            const chat = chats.find(c => c.id === currentChatId) || createStoredChat(currentChatId);
            chat.timestamp = new Date().toLocaleString();
            chat.lastMessage = getMessagePreview(message, images, documents);
            writeStoredChats([chat, ...chats.filter(item => item.id !== chat.id)]);
            loadChatHistory();
        }

        function loadChatHistory() {
            const chats = readStoredChats();
            chatHistory.innerHTML = '';

            chats.forEach(chat => {
                const item = document.createElement('div');
                item.className = 'chat-history-item';
                if (chat.id === currentChatId) item.classList.add('active');
                item.title = chat.timestamp;

                const title = document.createElement('span');
                title.className = 'chat-history-title';
                title.textContent = chat.lastMessage || 'Chat';

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-chat-btn';
                deleteBtn.type = 'button';
                deleteBtn.title = 'Delete chat';
                deleteBtn.textContent = 'x';
                deleteBtn.addEventListener('click', (event) => {
                    event.stopPropagation();
                    deleteChat(chat.id);
                });

                item.appendChild(title);
                item.appendChild(deleteBtn);
                item.addEventListener('click', () => switchChat(chat.id));
                chatHistory.appendChild(item);
            });
        }

        function switchChat(chatId) {
            const chat = getStoredChat(chatId);
            if (!chat) return;
            currentChatId = chatId;
            messagesWrapper.innerHTML = '';
            selectedImages = [];
            selectedDocuments = [];
            updateAttachmentPreview();
            updateSendButtonState();

            if (!chat.messages || chat.messages.length === 0) {
                renderEmptyState();
            } else {
                chat.messages.forEach(item => displayMessage(item.role, item.content));
            }

            loadChatHistory();
            closeSidebar();
        }

        async function deleteChat(chatId) {
            const chats = readStoredChats().filter(chat => chat.id !== chatId);
            writeStoredChats(chats);
            fetch(`${API_BASE}/session/${encodeURIComponent(chatId)}`, { method: 'DELETE' }).catch(() => {});

            if (currentChatId === chatId) {
                if (chats.length > 0) {
                    switchChat(chats[0].id);
                } else {
                    await newChat();
                }
            } else {
                loadChatHistory();
            }
        }
        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }
        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
