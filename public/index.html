<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bhadauriya AI — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0f0a;
      --surface:    #111a11;
      --accent:     #4caf50;
      --accent-light: #66bb6a;
      --text:       #f5f5f0;
      --text-muted: #a8a8a0;
      --user-bg:    #1b3a1b;
      --bot-bg:     #0f1f0f;
      --border:     rgba(76, 175, 80, 0.15);
      --trunk-color: #8B6F47;
      --foliage-1:  #4caf50;
      --foliage-2:  #66bb6a;
      --font-head:  'Syne', sans-serif;
      --font-mono:  'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* ── Layout: Single column, full height ── */
    .dashboard {
      display: grid;
      grid-template-rows: 60px 1fr;
      height: 100vh;
      gap: 0;
    }

    /* ── Topbar ── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    .topbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 100%;
      height: 100%;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(76, 175, 80, 0.08);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-size: 11px;
      color: var(--accent-light);
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-light);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Main Chat Area ── */
    .chat-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      align-items: center;
      justify-content: flex-start;
    }

    /* Nature texture background using CSS only */
    .chat-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(76, 175, 80, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(76, 175, 80, 0.02) 0%, transparent 50%),
        radial-gradient(ellipse at 40% 20%, rgba(76, 175, 80, 0.02) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Leaf pattern texture */
    .chat-area::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(76, 175, 80, 0.02) 35px, rgba(76, 175, 80, 0.02) 70px),
        repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(76, 175, 80, 0.015) 35px, rgba(76, 175, 80, 0.015) 70px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Messages Container ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      width: 100%;
      max-width: 760px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      text-align: center;
      animation: fadeIn 0.5s ease;
      padding: 40px 20px;
    }

    .welcome-icon {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
    }

    .welcome-icon svg {
      width: 100%;
      height: 100%;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .welcome h2 {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
      color: var(--accent-light);
      letter-spacing: -0.5px;
    }

    .welcome p {
      color: var(--text-muted);
      font-size: 14px;
      max-width: 340px;
      line-height: 1.7;
    }

    /* ── Message bubbles ── */
    .message {
      display: flex;
      gap: 12px;
      animation: slideIn 0.3s ease;
      align-items: flex-end;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .message.user {
      flex-direction: row-reverse;
      justify-content: flex-end;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .avatar.bot {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
    }

    .avatar.user {
      background: linear-gradient(135deg, #2d5a2d, #1b3a1b);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 600px;
      word-break: break-word;
    }

    .message.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(76, 175, 80, 0.25);
      color: var(--text);
    }

    .message-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    .message.user .message-meta {
      text-align: right;
    }

    /* ── Typing indicator with green dots ── */
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 0;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-light);
      animation: typing 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* ── Input Area (pinned at bottom) ── */
    .input-area {
      width: 100%;
      max-width: 760px;
      padding: 16px 20px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      transition: all 0.2s ease;
    }

    .input-wrapper:focus-within {
      border-color: rgba(76, 175, 80, 0.4);
      background: rgba(76, 175, 80, 0.02);
    }

    #messageInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      min-height: 20px;
    }

    #messageInput::placeholder {
      color: var(--text-muted);
    }

    #messageInput::-webkit-scrollbar { width: 3px; }
    #messageInput::-webkit-scrollbar-thumb { background: var(--border); }

    .send-btn {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
      font-weight: 600;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
    }

    .send-btn:active {
      transform: scale(0.96);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg {
      width: 16px;
      height: 16px;
    }

    .input-hint {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.3px;
    }

    /* ── Error message ── */
    .error-bubble {
      background: rgba(244, 67, 54, 0.08) !important;
      border-color: rgba(244, 67, 54, 0.2) !important;
      color: #ef5350 !important;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .messages {
        max-width: 100%;
      }

      .input-area {
        max-width: 100%;
      }

      .bubble {
        max-width: calc(100vw - 80px);
      }

      .welcome h2 {
        font-size: 24px;
      }

      .welcome p {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

<div class="dashboard">

  <!-- Top Bar -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <!-- Trunk -->
          <rect x="40" y="65" width="20" height="40" fill="var(--trunk-color)"/>
          <!-- Foliage layers (3 triangles like a pine tree) -->
          <polygon points="50,20 20,50 80,50" fill="var(--foliage-1)"/>
          <polygon points="50,40 15,75 85,75" fill="var(--foliage-2)"/>
          <polygon points="50,60 10,100 90,100" fill="var(--foliage-1)"/>
        </svg>
      </div>
      Bhadauriya AI
    </div>
    <div class="topbar-right">
      <div class="status-pill">
        <div class="status-dot"></div>
        ONLINE
      </div>
    </div>
  </header>

  <!-- Chat Area -->
  <main class="chat-area">
    <div class="messages" id="messages">
      <!-- Welcome screen -->
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">
          <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
            <!-- Trunk -->
            <rect x="40" y="65" width="20" height="40" fill="var(--trunk-color)"/>
            <!-- Foliage layers (3 triangles like a pine tree) -->
            <polygon points="50,20 20,50 80,50" fill="var(--foliage-1)"/>
            <polygon points="50,40 15,75 85,75" fill="var(--foliage-2)"/>
            <polygon points="50,60 10,100 90,100" fill="var(--foliage-1)"/>
          </svg>
        </div>
        <h2>Bhadauriya AI</h2>
        <p>Your nature-inspired AI assistant. Ask anything in Hindi or English.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="messageInput"
          placeholder="Ask me anything..."
          rows="1"
          maxlength="4000"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter ↵ to send • Shift+Enter for new line</div>
    </div>
  </main>

</div>

<script>
  // ── Theme Colors ──────────────────────────────────────────────
  const COLORS = {
    trunk: '#8B6F47',
    foliage1: '#4caf50',
    foliage2: '#66bb6a'
  };

  // ── Tree SVG Template ──────────────────────────────────────────
  const treeSvg = `
    <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
      <rect x="40" y="65" width="20" height="40" fill="${COLORS.trunk}"/>
      <polygon points="50,20 20,50 80,50" fill="${COLORS.foliage1}"/>
      <polygon points="50,40 15,75 85,75" fill="${COLORS.foliage2}"/>
      <polygon points="50,60 10,100 90,100" fill="${COLORS.foliage1}"/>
    </svg>
  `;

  let sessionId = null;
  let messageCount = 0;
  let isLoading = false;

  // ── Init ──────────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch('/api/session', { method: 'POST' });
      const data = await res.json();
      sessionId = data.sessionId;
    } catch (e) {
      sessionId = 'local-' + Date.now();
    }
  }

  // ── Auto-resize textarea ──────────────────────────────────────
  const textarea = document.getElementById('messageInput');
  textarea.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  textarea.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Send message ──────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if (!message || isLoading) return;

    isLoading = true;
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;

    // Hide welcome screen
    const welcome = document.getElementById('welcomeScreen');
    if (welcome) welcome.remove();

    // Clear input
    input.value = '';
    input.style.height = 'auto';

    // Add user message
    addMessage('user', message);

    // Show typing indicator
    const typingId = showTyping();

    // Call API
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, sessionId })
      });

      const data = await res.json();
      removeTyping(typingId);

      if (res.ok) {
        addMessage('bot', data.reply);
        messageCount++;
      } else {
        addMessage('bot', '⚠️ ' + (data.error || 'Something went wrong'), true);
      }

    } catch (err) {
      removeTyping(typingId);
      addMessage('bot', '⚠️ Connection error. Please try again.', true);
    }

    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }

  // ── Add message bubble ────────────────────────────────────────
  function addMessage(role, text, isError = false) {
    const container = document.getElementById('messages');
    const now = new Date().toLocaleTimeString('en-IN', {
      hour: '2-digit', minute: '2-digit'
    });

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = role === 'bot' ? '🌲' : '👤';
    const avatarLabel = role === 'bot' ? 'Bhadauriya AI Assistant' : 'You';
    const errorClass = isError ? ' error-bubble' : '';

    div.innerHTML = `
      <div class="avatar ${role}" aria-label="${avatarLabel}">${avatar}</div>
      <div>
        <div class="bubble${errorClass}">${formatText(text)}</div>
        <div class="message-meta">${now}</div>
      </div>
    `;

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  // ── Format text (basic markdown) ─────────────────────────────
  function formatText(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code style="background:rgba(76,175,80,0.15);padding:2px 6px;border-radius:4px;font-size:12px;">$1</code>')
      .replace(/\n/g, '<br>');
  }

  // ── Typing indicator ──────────────────────────────────────────
  function showTyping() {
    const container = document.getElementById('messages');
    const id = 'typing-' + Date.now();

    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = id;
    div.innerHTML = `
      <div class="avatar bot" aria-label="Bhadauriya AI Assistant">🌲</div>
      <div class="bubble">
        <div class="typing-indicator" aria-label="Assistant is typing">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    `;

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // ── New chat ──────────────────────────────────────────────────
  async function newChat() {
    if (sessionId) {
      try {
        await fetch(`/api/session/${sessionId}`, { method: 'DELETE' });
      } catch (e) {}
    }

    const container = document.getElementById('messages');
    container.innerHTML = `
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">
          ${treeSvg}
        </div>
        <h2>Bhadauriya AI</h2>
        <p>Start a new conversation. Ask anything in Hindi or English.</p>
      </div>
    `;

    messageCount = 0;
    document.getElementById('messageInput').focus();

    await init();
  }

  // ── Start ─────────────────────────────────────────────────────
  init();
  document.getElementById('messageInput').focus();
</script>

</body>
</html>
